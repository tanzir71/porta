[package]
name = "porta"
version = "0.1.0"
description = "A UI-first tunneling app for macOS"
authors = ["Porta contributors"]
edition = "2021"

[lib]
name = "porta_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
